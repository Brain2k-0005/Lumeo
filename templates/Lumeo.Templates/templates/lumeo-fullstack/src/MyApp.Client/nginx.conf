server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy everything the client calls to the API container. Host is forwarded
    # so the emailed confirmation link is generated against the browser-visible origin.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health   { proxy_pass http://api:8080; }
    location /scalar     { proxy_pass http://api:8080; }
    location /openapi    { proxy_pass http://api:8080; }

    # SPA fallback for client-side routing. (nginx's bundled mime.types maps .wasm.)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
