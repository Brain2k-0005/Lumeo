name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel a superseded run when new commits land on the same branch/PR — the suite
# is re-run several times (build, test, registry, coverage, vuln) so a stale run is
# pure wasted critical path.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docs/source parameter parity
        # Diffs every component's [Parameter] properties against its docs page's
        # API table (scripts/docs-parity/check.py) and fails with a per-page
        # report on any undocumented parameter. Stdlib-only Python, no build
        # needed, so it runs first for the fastest feedback on a docs gap.
        run: python3 scripts/docs-parity/check.py

      - name: Setup .NET
        # Both SDKs installed side by side: 10.0.x builds/runs the primary net10.0
        # lane (and everything not test-execution — restore/build/pack for the
        # net8.0 half of every multi-targeted package needs only the net8 NuGet
        # reference-assembly packs, resolved automatically from NuGet, not an
        # installed net8 SDK/runtime). 8.0.x is here specifically so the "Test
        # (net8.0 lane)" step below has a genuine net8.0 shared runtime to execute
        # against — without it, a net8.0-targeted test binary would fail to launch
        # ("framework not found") rather than actually proving net8 runtime parity.
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore
        run: dotnet restore Lumeo.slnx

      - name: Build
        # Builds BOTH TFMs of every multi-targeted project (net8.0;net10.0) in one
        # invocation — MSBuild dispatches an inner build per TargetFrameworks entry
        # automatically, no matrix/flag needed.
        run: dotnet build Lumeo.slnx -c Release --no-restore -warnaserror

      - name: Test (net10.0 lane)
        # Exclude Lumeo.Tests.E2E — those are Playwright tests that need browser
        # binaries + a running dev server (see tests/Lumeo.Tests.E2E/README.md).
        # The project still builds in the previous step, so compile breakage is
        # caught; only execution is skipped. Wire to a separate workflow when
        # ready to run them headless against a deployed preview.
        # -f net10.0 pins this lane explicitly now that Lumeo.Tests multi-targets
        # (net8.0;net10.0) — without it `dotnet test` on the solution would run
        # BOTH TFMs here, duplicating the net8.0 lane added below and making the
        # two lanes' results harder to tell apart in the Actions log.
        # Also exclude Category=EjectGateFull — CliStandaloneE2ETests vendors ALL
        # ~164 registry components into one project and does a real `dotnet build`
        # to prove the NuGet-free "standalone eject" guarantee; too slow for every
        # PR. It runs on its own weekly/dispatch/release cadence in
        # .github/workflows/eject-gate.yml instead. The paired Category=
        # EjectGateSmoke test (5 representative components) carries no exclusion
        # and still runs here as a cheap early warning between full-gate runs.
        run: dotnet test Lumeo.slnx -c Release --no-build --verbosity normal -f net10.0 --filter "FullyQualifiedName!~Lumeo.Tests.E2E&Category!=EjectGateFull"

      - name: Test (net8.0 lane)
        # The actual net8-vs-net10 runtime-parity gate the multi-target rollout
        # needs: the net8.0 build of Lumeo.Tests already compiled successfully in
        # the Build step above (proving API-surface parity); this proves the SAME
        # 4,800+ tests also PASS when executed against a genuine net8.0 shared
        # runtime (not net10 with roll-forward standing in for it), catching any
        # subtle net8-vs-net10 BCL/serialization/culture/timer divergence the
        # static scan + compile-only check can't see.
        # DOTNET_ROLL_FORWARD=LatestPatch overrides the csproj's <RollForward>LatestMajor</RollForward>
        # (set there purely for local dev, where only a net10 SDK may be installed — see
        # tests/Lumeo.Tests/Lumeo.Tests.csproj). LatestMajor rolls forward even when the exact
        # requested major IS installed, so on this runner — which has both 8.0.x and 10.0.x
        # installed — it would silently launch the net8.0 test binary against the net10.0 runtime,
        # defeating the lane's entire purpose. LatestPatch keeps the lane on a GENUINE .NET 8
        # runtime (it only rolls forward within 8.0.x, never to 9.x/10.x), while still allowing the
        # patch roll-forward that Disable forbade: the net8.0 testhost requests 8.0.0 exactly, but
        # setup-dotnet's 8.0.x installs only the latest 8.0 patch (e.g. 8.0.28), so Disable failed
        # with "You must install or update .NET" on every run. LatestPatch still fails fast with
        # "framework not found" if the net8.0 shared runtime is missing entirely (only 9.x/10.x present).
        env:
          DOTNET_ROLL_FORWARD: LatestPatch
        run: dotnet test tests/Lumeo.Tests/Lumeo.Tests.csproj -c Release --no-build --verbosity normal -f net8.0 --filter "FullyQualifiedName!~Lumeo.Tests.E2E"

      - name: Registry is up to date
        # The MCP/docs registry (registry.json, components-api.json and the
        # per-component docs) is derived from source by Lumeo.RegistryGen. A
        # component or parameter change that forgets to regenerate would ship a
        # stale registry — the very drift that bit releases before. Regenerate and
        # fail if anything but the run-specific `generated` timestamp changes. The
        # generator is line-ending-deterministic, so on an unchanged tree this is a
        # no-op diff.
        run: |
          set -o pipefail
          dotnet run --project tools/Lumeo.RegistryGen -c Release --no-build
          # docs/Lumeo.Docs/wwwroot/registry.json (the top-level docs app artifact, distinct from
          # the per-component wwwroot/registry/*.json files RegistryGen writes directly above) is
          # normally refreshed by an MSBuild <Copy> target in Lumeo.Docs.csproj — but that project
          # is NOT part of Lumeo.slnx (only Lumeo.Docs.Tests.csproj is), so it never runs here and
          # the committed copy can silently drift from the freshly-regenerated source registry
          # (caught after several rounds of drift — Codex P2). Mirror the Copy target's effect
          # directly so the freshness check below actually covers it.
          cp src/Lumeo/registry/registry.json docs/Lumeo.Docs/wwwroot/registry.json
          # Same gap, second artifact: docs/Lumeo.Docs/wwwroot/registry-search.json (the fallback
          # local search dataset) is generated by Lumeo.Docs.csproj's GenerateLocalSearchIndex
          # target (AfterTargets="CopyRegistry"), which — like CopyRegistry above — never runs here
          # since Lumeo.Docs.csproj isn't in Lumeo.slnx. Run the SAME node script the target runs
          # (ubuntu-latest ships Node.js by default; no actions/setup-node needed) so a component
          # description/route change that regenerates the registry but ships a stale search index
          # is also caught (Codex P2).
          node scripts/algolia/generate-local-index.mjs
          PATHS="src/Lumeo/registry tools/lumeo-mcp/src/components-api.json tools/lumeo-mcp/src/registry.json docs/Lumeo.Docs/wwwroot/registry docs/Lumeo.Docs/wwwroot/registry.json docs/Lumeo.Docs/wwwroot/registry-search.json"
          DRIFT=$(git diff -U0 -- $PATHS | grep -E '^[+-]' | grep -vE '^[+-]{3}' | grep -v '"generated"' || true)
          if [ -n "$DRIFT" ]; then
            echo "::error::Registry is stale. Run 'dotnet run --project tools/Lumeo.RegistryGen', sync docs/Lumeo.Docs/wwwroot/registry.json from src/Lumeo/registry/registry.json, and commit the result."
            git --no-pager diff -- $PATHS
            exit 1
          fi

      - name: Code coverage gate (core Lumeo)
        # Re-run the suite under coverage instrumentation, scoped to the core Lumeo
        # assembly (coverage.runsettings), and fail if line coverage drops below the
        # floor. The floor sits well under the current ~80% (Release) so it catches a
        # real regression without being brittle to small platform differences. The
        # uninstrumented Test step above stays the primary correctness gate.
        # -f net10.0: pinned now that Lumeo.Tests multi-targets (net8.0;net10.0) —
        # coverage is a source-level metric (same code under test either TFM), so
        # instrumenting/running it twice would be pure duplicate cost, not signal.
        run: |
          set -o pipefail
          dotnet test tests/Lumeo.Tests/Lumeo.Tests.csproj -c Release --no-build -f net10.0 \
            --collect:"XPlat Code Coverage" --settings coverage.runsettings \
            --results-directory covreport
          COB=$(find covreport -name coverage.cobertura.xml | head -1)
          if [ -z "$COB" ]; then echo "::error::No coverage report produced"; exit 1; fi
          # Use grep -m1 (stop after the first, root-level line-rate) instead of
          # `grep ... | head -1`: under `set -o pipefail`, head closing the pipe made
          # grep abort with "write error: Broken pipe" (exit 2) once the cobertura
          # report grew large enough that grep was still writing — failing the step
          # before coverage was ever evaluated. -m1 exits cleanly with no SIGPIPE.
          RATE=$(grep -o -m1 'line-rate="[0-9.]*"' "$COB" | sed 's/[^0-9.]//g')
          if [ -z "$RATE" ]; then echo "::error::Could not parse line-rate from $COB"; exit 1; fi
          PCT=$(awk "BEGIN{printf \"%.1f\", $RATE*100}")
          echo "Core Lumeo line coverage: ${PCT}%"
          awk "BEGIN{exit !($RATE >= 0.70)}" || { echo "::error::Core line coverage ${PCT}% is below the 70% floor"; exit 1; }

      - name: Check vulnerable packages (shipped + tests, excluding E2E)
        # E2E test project pulls SixLabors.ImageSharp 3.x for perceptual visual
        # diffs (CVE-2024-2cmq-823j-5qj8 / CVE-2024-rxmq-m78w-7wmc). Both apply
        # to *malicious image decode*; our usage only loads locally-generated
        # Playwright screenshots, so attack surface is zero. ImageSharp 4.x
        # would fix this but requires a commercial Six Labors license. Scope
        # the vulnerability gate to projects we actually ship to users.
        run: |
          set -o pipefail
          dotnet list src/Lumeo/Lumeo.csproj package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          dotnet list src/Lumeo.Charts/Lumeo.Charts.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.CodeEditor/Lumeo.CodeEditor.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.DataGrid/Lumeo.DataGrid.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.Editor/Lumeo.Editor.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.FileViewer/Lumeo.FileViewer.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.Scheduler/Lumeo.Scheduler.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.Gantt/Lumeo.Gantt.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.Maps/Lumeo.Maps.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.Motion/Lumeo.Motion.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          dotnet list src/Lumeo.PdfViewer/Lumeo.PdfViewer.csproj package --vulnerable --include-transitive 2>&1 | tee -a vulnerable.txt
          ! grep -q "has the following vulnerable packages" vulnerable.txt

  mcp-server:
    # The MCP server (tools/lumeo-mcp) is TypeScript and was previously only
    # typechecked at release time (publish.yml), so a tsc break or a broken tool
    # first surfaced against live npm. Build + run its tests on every PR/push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build + test MCP server
        working-directory: tools/lumeo-mcp
        run: |
          npm ci
          npm test
