name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build pre-compiled Tailwind utilities
        run: |
          npm install --prefix src/Lumeo
          npm run build:css --prefix src/Lumeo

      - name: Restore
        run: dotnet restore src/Lumeo/Lumeo.csproj

      - name: Build
        run: dotnet build src/Lumeo/Lumeo.csproj -c Release --no-restore -warnaserror

      - name: Test
        run: |
          dotnet restore tests/Lumeo.Tests/Lumeo.Tests.csproj
          dotnet test tests/Lumeo.Tests/Lumeo.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Pack
        run: dotnet pack src/Lumeo/Lumeo.csproj -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
