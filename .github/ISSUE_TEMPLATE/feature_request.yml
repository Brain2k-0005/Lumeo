name: ✨ Feature request
description: Propose a new component, a new API, or a meaningful improvement to an existing one.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        If you're proposing a whole new component, check the
        [roadmap](https://github.com/Brain2k-0005/Lumeo/discussions/categories/roadmap)
        and existing issues first — it may already be planned.

        Small questions / "how do I...?" threads fit better in
        [Discussions](https://github.com/Brain2k-0005/Lumeo/discussions).

  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: |
        What are you building that hits a wall with what Lumeo ships today?
        Concrete user stories beat abstract wishes — "I can't do X because Y"
        is much more actionable than "please add feature Z".
      placeholder: |
        I'm building a file-management app. Lumeo has `<Breadcrumb>` but it
        doesn't support overflow collapsing, so paths >5 segments wrap and
        blow out my toolbar.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / behavior
      description: What would the API look like? A code sketch is ideal.
      placeholder: |
        ```razor
        <Breadcrumb MaxVisibleItems="3">
            <!-- …hidden middle items collapse into a "..." dropdown… -->
        </Breadcrumb>
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds / other libraries / how you solve this today.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New component
        - New parameter on an existing component
        - New service / utility
        - CLI feature
        - Theming / customizer
        - Documentation / examples
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Willing to contribute?
      options:
        - label: I'd be open to submitting a PR for this (we'll help you land it).
