<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://lumeo.nativ.sh" />
    <title>Lumeo — bootstrapping…</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            display: flex; align-items: center; justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a; color: #fafafa;
        }
        .wrap { text-align: center; max-width: 32rem; padding: 2rem; }
        .logo {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: #fafafa;
            display: inline-block;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .logo::after {
            content: '';
            position: absolute; inset: 0; margin: auto;
            width: 16px; height: 16px;
            background: #0a0a0a;
            border-radius: 50%;
        }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem; }
        p { margin: 0.5rem 0; color: #a1a1aa; font-size: 0.9rem; line-height: 1.6; }
        code { font-family: ui-monospace, SFMono-Regular, monospace; background: #1a1a1a; padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="wrap">
        <span class="logo" aria-hidden="true"></span>
        <h1>Lumeo</h1>
        <p>Cloudflare Pages project bootstrapped.</p>
        <p>The real docs site ships from GitHub Actions —
           push to <code>master</code> to trigger the first real deploy.</p>
    </div>
</body>
</html>
