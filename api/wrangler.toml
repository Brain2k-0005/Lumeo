name = "lumeo-preset"
main = "worker.js"
compatibility_date = "2025-11-01"

# KV namespace binding — the Worker reads/writes via env.PRESETS.
# Create it once with:
#   wrangler kv namespace create PRESETS
# Then paste the returned `id` below (replace the placeholder).
#
# Preview id is optional — used by `wrangler dev` for local testing against a
# temporary namespace so you don't pollute production while iterating.
[[kv_namespaces]]
binding = "PRESETS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# preview_id = "REPLACE_WITH_PREVIEW_ID"

# Optional: custom domain. Uncomment AFTER adding api.lumeo.nativ.sh to your
# Cloudflare DNS zone and pointing it at this Worker (route via the dashboard
# or routes = [...] here). Leaving commented means the Worker is reachable only
# via lumeo-preset.<your-subdomain>.workers.dev, which is fine for most uses.
# routes = [
#     { pattern = "api.lumeo.nativ.sh/preset*", zone_name = "lumeo.nativ.sh" }
# ]
