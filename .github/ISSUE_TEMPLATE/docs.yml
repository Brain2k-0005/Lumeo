name: 📚 Documentation issue
description: Missing, wrong, or confusing docs on lumeo.nativ.sh or in the README.
labels: ["documentation", "triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      description: Where does the issue live?
      placeholder: https://lumeo.nativ.sh/components/combobox
    validations:
      required: true

  - type: textarea
    id: whats-wrong
    attributes:
      label: What's wrong or missing?
      description: |
        Quote the confusing snippet, or describe what you expected the page to
        explain but didn't find.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording / example (optional)
      description: If you already know how you'd fix it, paste the rewrite here.
      render: markdown
