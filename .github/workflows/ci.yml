name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lumeo.slnx

      - name: Build
        run: dotnet build Lumeo.slnx -c Release --no-restore -warnaserror

      - name: Test
        # Exclude Lumeo.Tests.E2E — those are Playwright tests that need browser
        # binaries + a running dev server (see tests/Lumeo.Tests.E2E/README.md).
        # The project still builds in the previous step, so compile breakage is
        # caught; only execution is skipped. Wire to a separate workflow when
        # ready to run them headless against a deployed preview.
        run: dotnet test Lumeo.slnx -c Release --no-build --verbosity normal --filter "FullyQualifiedName!~Lumeo.Tests.E2E"

      - name: Check vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt && ! grep -q "has the following vulnerable packages" vulnerable.txt
