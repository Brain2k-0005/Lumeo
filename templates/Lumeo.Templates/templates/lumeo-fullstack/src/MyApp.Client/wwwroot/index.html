<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyApp</title>
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Lumeo prebuilt CSS — shipped inside the Lumeo NuGet package as static web
         assets, so no Tailwind build and no manual copy are needed. -->
    <link rel="stylesheet" href="_content/Lumeo/css/lumeo.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/lumeo-utilities.css" />
    <style>
        /* FocusOnNavigate moves focus to the page h1 for screen readers; keep that
           behavior but don't paint a focus ring for a programmatic, non-keyboard focus. */
        h1:focus { outline: none; }
    </style>
</head>

<body class="bg-background text-foreground">
    <div id="app">
        <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#71717a;">
            Loading…
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none; position:fixed; bottom:0; width:100%; background:#ffcccc; padding:0.6rem 1rem; z-index:1000;">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss" style="cursor:pointer; margin-left:1rem;">🗙</span>
    </div>

    <!-- theme.js runs synchronously so the correct light/dark class is on <html>
         before first paint (no flash of the wrong theme). -->
    <script src="_content/Lumeo/js/theme.js"></script>
    <!-- Component interop (dialogs, popovers, tooltips, data grid, …). -->
    <script src="_content/Lumeo/js/components.js" type="module"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
