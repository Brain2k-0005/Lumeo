<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumeo &mdash; Blazor Component Library</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Tailwind CSS v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Lumeo theme CSS -->
    <link rel="stylesheet" href="_content/Lumeo/css/lumeo.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_blue.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_green.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_rose.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_orange.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_violet.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_amber.css" />
    <link rel="stylesheet" href="_content/Lumeo/css/themes/_teal.css" />

    <!-- Self-hosted fonts (GDPR compliant) -->
    <link rel="stylesheet" href="css/fonts.css" />

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
    <link href="Lumeo.Docs.styles.css" rel="stylesheet" />

    <script type="importmap"></script>

    <style type="text/tailwindcss">
        /* Tailwind v4 theme mapping to Lumeo CSS variables */
        @theme {
            --color-background: var(--color-background);
            --color-foreground: var(--color-foreground);
            --color-card: var(--color-card);
            --color-card-foreground: var(--color-card-foreground);
            --color-popover: var(--color-popover);
            --color-popover-foreground: var(--color-popover-foreground);
            --color-primary: var(--color-primary);
            --color-primary-foreground: var(--color-primary-foreground);
            --color-secondary: var(--color-secondary);
            --color-secondary-foreground: var(--color-secondary-foreground);
            --color-muted: var(--color-muted);
            --color-muted-foreground: var(--color-muted-foreground);
            --color-accent: var(--color-accent);
            --color-accent-foreground: var(--color-accent-foreground);
            --color-destructive: var(--color-destructive);
            --color-destructive-foreground: var(--color-destructive-foreground);
            --color-destructive-light: var(--color-destructive-light);
            --color-destructive-text: var(--color-destructive-text);
            --color-success: var(--color-success);
            --color-success-foreground: var(--color-success-foreground);
            --color-success-light: var(--color-success-light);
            --color-success-text: var(--color-success-text);
            --color-warning: var(--color-warning);
            --color-warning-foreground: var(--color-warning-foreground);
            --color-warning-light: var(--color-warning-light);
            --color-warning-text: var(--color-warning-text);
            --color-info: var(--color-info);
            --color-info-foreground: var(--color-info-foreground);
            --color-info-light: var(--color-info-light);
            --color-info-text: var(--color-info-text);
            --color-border: var(--color-border);
            --color-input: var(--color-input);
            --color-ring: var(--color-ring);
            --color-chart-1: var(--color-chart-1);
            --color-chart-2: var(--color-chart-2);
            --color-chart-3: var(--color-chart-3);
            --color-chart-4: var(--color-chart-4);
            --color-chart-5: var(--color-chart-5);
            --color-sidebar: var(--color-sidebar);
            --color-sidebar-foreground: var(--color-sidebar-foreground);
            --color-sidebar-primary: var(--color-sidebar-primary);
            --color-sidebar-primary-foreground: var(--color-sidebar-primary-foreground);
            --color-sidebar-accent: var(--color-sidebar-accent);
            --color-sidebar-accent-foreground: var(--color-sidebar-accent-foreground);
            --color-sidebar-border: var(--color-sidebar-border);
            --radius-sm: var(--radius-sm);
            --radius-md: var(--radius-md);
            --radius-lg: var(--radius-lg);
            --radius-xl: var(--radius-xl);
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoom-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slide-in-from-bottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slide-in-from-top { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes slide-in-from-left { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes slide-in-from-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes accordion-down { from { height: 0; opacity: 0; } to { height: var(--radix-accordion-content-height, auto); opacity: 1; } }

        .animate-fade-in { animation: fade-in 0.15s ease-out; }
        .animate-zoom-in { animation: zoom-in 0.15s ease-out; }
        .animate-slide-in-from-bottom { animation: slide-in-from-bottom 0.3s ease-out; }
        .animate-slide-in-from-top { animation: slide-in-from-top 0.3s ease-out; }
        .animate-slide-in-from-left { animation: slide-in-from-left 0.3s ease-out; }
        .animate-slide-in-from-right { animation: slide-in-from-right 0.3s ease-out; }
        .animate-accordion-down { animation: accordion-down 0.2s ease-out; }

        /* === Lumeo Splash Screen === */
        .lumeo-splash {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: var(--color-background, hsl(0 0% 100%));
            color: var(--color-foreground, hsl(240 5.9% 10%));
        }
        html.dark .lumeo-splash {
            background: var(--color-background, hsl(240 10% 3.9%));
            color: var(--color-foreground, hsl(0 0% 98%));
        }
        .lumeo-splash-inner {
            display: flex; flex-direction: column; align-items: center;
            gap: 2.5rem; text-align: center;
        }
        .lumeo-splash-logo-wrap {
            position: relative; width: 88px; height: 88px;
            display: flex; align-items: center; justify-content: center;
        }
        .lumeo-splash-ripple {
            position: absolute; inset: 0; border-radius: 50%;
            border: 1px solid currentColor; opacity: 0;
        }
        @keyframes splash-ripple {
            0%   { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(7); opacity: 0; }
        }
        .lumeo-splash-ripple.r1 { animation: splash-ripple 5.5s cubic-bezier(0, 0.45, 0.2, 1) 1.2s infinite; }
        .lumeo-splash-ripple.r2 { animation: splash-ripple 5.5s cubic-bezier(0, 0.45, 0.2, 1) 3s infinite; }
        .lumeo-splash-ripple.r3 { animation: splash-ripple 5.5s cubic-bezier(0, 0.45, 0.2, 1) 4.8s infinite; }
        .lumeo-splash-svg {
            position: relative; z-index: 1; width: 88px; height: 88px;
            animation: splash-logo-in 1.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes splash-logo-in {
            from { opacity: 0; transform: scale(0.65); }
            to   { opacity: 1; transform: scale(1); }
        }
        .lumeo-splash-ring { animation: splash-ring-breathe 4.5s ease-in-out 1.4s infinite; }
        @keyframes splash-ring-breathe {
            0%, 100% { opacity: 0.28; }
            50%       { opacity: 0.65; }
        }
        .lumeo-splash-dot {
            transform-origin: 16px 16px;
            animation: splash-dot-breathe 4.5s ease-in-out 1.4s infinite;
        }
        @keyframes splash-dot-breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50%       { transform: scale(1.22); opacity: 1; }
        }
        .lumeo-splash-texts { display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
        .lumeo-splash-name {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 2rem; font-weight: 600; letter-spacing: 0.02em; line-height: 1;
            animation: splash-name-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
        }
        @keyframes splash-name-in {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lumeo-splash-tagline {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
            animation: splash-tagline-in 1s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both;
        }
        @keyframes splash-tagline-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 0.35; transform: translateY(0); }
        }
        /* App entrance when Blazor replaces the splash */
        @keyframes lumeo-app-enter {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lumeo-app-enter { animation: lumeo-app-enter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both; }
    </style>
</head>

<body class="bg-background text-foreground">
    <div id="app">
        <div class="lumeo-splash">
            <div class="lumeo-splash-inner">
                <div class="lumeo-splash-logo-wrap">
                    <div class="lumeo-splash-ripple r1"></div>
                    <div class="lumeo-splash-ripple r2"></div>
                    <div class="lumeo-splash-ripple r3"></div>
                    <svg class="lumeo-splash-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="16" cy="16" r="9" fill="none" stroke="currentColor" stroke-width="2" class="lumeo-splash-ring" />
                        <circle cx="16" cy="16" r="3" fill="currentColor" class="lumeo-splash-dot" />
                    </svg>
                </div>
                <div class="lumeo-splash-texts">
                    <span class="lumeo-splash-name">Lumeo</span>
                    <span class="lumeo-splash-tagline">Blazor Component Library</span>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet style="display:none; position:fixed; bottom:0; width:100%; background:#ffcccc; padding:0.6rem 1rem; z-index:1000;">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss" style="cursor:pointer; margin-left:1rem;">X</span>
    </div>
    <script src="_content/Lumeo/js/theme.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
