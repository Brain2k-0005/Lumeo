# Full stack: PostgreSQL + MailHog + the API + the nginx-served WASM client.
# Quickstart:  docker compose up -d   →  app on http://localhost:${CLIENT_PORT}
# Everyday dev (hybrid):  docker compose up -d postgres mailhog   then run both apps
# with `dotnet run` (see README). All ports/credentials come from the .env file.
name: myapp

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"   # SMTP
      - "${MAILHOG_UI_PORT}:8025"     # web UI

  api:
    build:
      context: .
      dockerfile: src/MyApp.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development   # migrate + seed on startup
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Smtp__Host: mailhog
      Smtp__Port: "1025"
      ClientOrigin: "http://localhost:${CLIENT_PORT}"
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started

  client:
    build:
      context: .
      dockerfile: src/MyApp.Client/Dockerfile
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - api

volumes:
  pgdata:
