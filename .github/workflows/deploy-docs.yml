name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Install npm deps
        run: |
          npm install --no-audit --no-fund
          (cd docs/Lumeo.Docs && npm install --no-audit --no-fund)

      - name: Publish Blazor WASM
        # Publish first — this writes release/wwwroot/ with whatever's in git. The CSS overwrite step
        # below then replaces the stale tailwind bundles with a fresh build directly inside the release
        # directory, bypassing MSBuild's static-web-asset manifest cache (which otherwise pinned the
        # old bytes even when the source files were regenerated before publish).
        run: dotnet publish docs/Lumeo.Docs/Lumeo.Docs.csproj -c Release -o release

      - name: Rebuild Tailwind bundles into the release folder
        run: |
          npx @tailwindcss/cli \
            -i ./src/Lumeo/Styles/lumeo-utilities.src.css \
            -o ./release/wwwroot/_content/Lumeo/css/lumeo-utilities.css \
            --minify
          npx @tailwindcss/cli \
            -i ./docs/Lumeo.Docs/Styles/tailwind.css \
            -o ./release/wwwroot/css/tailwind.out.css \
            --minify

      - name: Remove pre-compressed CSS (stale copies from dotnet publish)
        # MSBuild pre-compressed `.br` / `.gz` copies of every CSS file during publish. Those copies
        # are built from the stale bytes that were in release/ before the Tailwind rebuild above, so
        # if Fastly serves one of them, the client gets old CSS. Delete them; Fastly compresses at the
        # edge anyway.
        run: |
          find release/wwwroot -name "*.br" -delete
          find release/wwwroot -name "*.gz" -delete

      - name: Stamp CSS cache-busters with commit SHA
        # index.html (and its copy 404.html created later) reference CSS with `?v=__LUMEO_BUILD__`.
        # Replace the placeholder with the 7-char git SHA so every deploy yields a new query string
        # and the browser re-fetches CSS instead of serving stale cached versions.
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          sed -i "s/__LUMEO_BUILD__/${SHORT_SHA}/g" release/wwwroot/index.html

      - name: Add CNAME for custom domain
        run: echo 'lumeo.nativ.sh' > release/wwwroot/CNAME

      - name: Copy registry to site root (for CLI --registry access at <site>/registry/*)
        run: |
          mkdir -p release/wwwroot/registry
          cp -r src/Lumeo/wwwroot/registry/* release/wwwroot/registry/ || true
          mkdir -p release/wwwroot/raw
          # The CLI's default scheme resolves component files under <site>/raw/<relpath>.
          # Copy src/Lumeo/* (sans wwwroot duplicates) so CLI file fetches work once Pages is live.
          rsync -a --exclude='wwwroot/_content' --exclude='obj' --exclude='bin' src/Lumeo/ release/wwwroot/raw/

      - name: Copy index.html to 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: release/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
