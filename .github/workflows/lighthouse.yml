name: Lighthouse

# Measurable Web-Vitals baseline for the docs site. Defaults to the LIVE
# Cloudflare-deployed site for the weekly regression signal, but accepts a
# `base_url` input so it can also be pointed at a per-PR Cloudflare preview
# (see deploy-preview.yml) to measure a change before it reaches master.
# Assertions are "warn"-level so a run never fails the actions tab — the value
# is the uploaded HTML report and the budget deltas, not a red X.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to audit (e.g. a Cloudflare preview URL). Defaults to production.'
        required: false
        default: 'https://lumeo.nativ.sh'
  schedule:
    # Weekly, Monday 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ github.event.inputs.base_url || 'https://lumeo.nativ.sh' }}/
            ${{ github.event.inputs.base_url || 'https://lumeo.nativ.sh' }}/components
            ${{ github.event.inputs.base_url || 'https://lumeo.nativ.sh' }}/docs/introduction
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
