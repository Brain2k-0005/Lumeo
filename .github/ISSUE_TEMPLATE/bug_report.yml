name: 🐞 Bug report
description: Report a component or CLI behavior that doesn't match what's documented.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you can
        give — especially a reproduction — the faster this gets fixed.

        Before you submit:
        - [ ] Searched [existing issues](https://github.com/Brain2k-0005/Lumeo/issues?q=is%3Aissue) — no duplicate?
        - [ ] Tried the latest version of Lumeo from NuGet?

  - type: input
    id: component
    attributes:
      label: Affected component or API
      description: e.g. `<DataGrid>`, `<Combobox>`, `lumeo apply`, `ThemeService`
      placeholder: Combobox
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        The single most important field. Either:
        - a minimal repo we can clone (**strongly preferred**)
        - a complete code snippet we can paste into a fresh `dotnet new lumeo-app`
        - steps on the live docs at <https://lumeo.nativ.sh>

        Issues without a reproduction usually get closed because we can't debug them.
      placeholder: |
        1. `dotnet new lumeo-app -n Repro && cd Repro`
        2. Replace `Pages/Home.razor` with:
        ```razor
        <Combobox ...>
        ```
        3. Click the trigger — dropdown opens off-screen on Safari.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Screenshots / short screen-capture GIFs are great here.
    validations:
      required: true

  - type: dropdown
    id: hosting
    attributes:
      label: Blazor hosting model
      options:
        - WebAssembly (standalone)
        - WebAssembly (ASP.NET Core hosted)
        - Server (Blazor Server)
        - Static SSR
        - Auto (interactive)
        - Not sure
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET version
      description: Output of `dotnet --version`
      placeholder: "10.0.104"
    validations:
      required: true

  - type: input
    id: lumeo
    attributes:
      label: Lumeo version
      description: Version of the `Lumeo` NuGet package (check your .csproj)
      placeholder: "2.0.0-rc.10"
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Browsers
      description: Check all that reproduce the bug.
      multiple: true
      options:
        - Chrome / Chromium
        - Edge
        - Firefox
        - Safari (desktop)
        - Safari (iOS)
        - Chrome / Samsung (Android)
        - Not browser-specific (CLI / build-time issue)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Browser console / build logs
      description: Paste any errors or relevant logs here. Will be auto-formatted.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Workarounds you tried, related issues, theme customizations, etc.
